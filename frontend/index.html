<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA / Theme -->
    <meta name="theme-color" content="#0A0A1A" />
    <meta name="description" content="DailyFire - Personal Task Scheduler and Daily Routine Tracker" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DailyFire" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Open Graph (optional, for sharing) -->
    <meta property="og:title" content="DailyFire" />
    <meta property="og:description" content="Personal daily routine tracker and task scheduler" />
    <meta property="og:type" content="website" />

    <title>DailyFire</title>
    <style>
      body {
        background: #0A0A1A;
        margin: 0;
        /* Support iPhone notch / safe area */
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Register service worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
